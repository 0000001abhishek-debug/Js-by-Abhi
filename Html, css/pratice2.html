        //2. 18 percent gst calculation
        let iphonePrice = 79990;
        let airpodsPrice = 24990 * 2;

        let subtotal = iphonePrice + airpodsPrice;

        let finalAmount = subtotal + gst;

        console.log("Gst (18%) = ₹" + gst);
        console.log("Final Amount = ₹" + finalAmount);
