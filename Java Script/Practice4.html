<!DOCTYPE html>
<html>
<head>
    <title>Variables Practice</title>
</head>
<body>

    <h2 id="output"></h2>

    <script>
        // 1. Save your name in a variable
        var myName = "Abhishek";

        // 5. GST constant
        const GST = 18; // 18%

        // 3. Calculate Myntra Bag cost
        var bagPrice = 1000;

        // GST calculation
        var totalPrice = bagPrice + (bagPrice * GST / 100);

        // 2. Display name on page
        document.getElementById("output").innerHTML = "Hello " + myName;

        // 4. Show in console
        console.log("Bag Price: " + bagPrice);
        console.log("Total Price with GST: " + totalPrice);

        // 6. Use eval method
        var calculation = "200 + 300 * 2";
        var result = eval(calculation);

        console.log("Eval Result: " + result);
    </script>

</body>
</html>
